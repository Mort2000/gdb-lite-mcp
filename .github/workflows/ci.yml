name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - name: Install gdb
        run: sudo apt-get update && sudo apt-get install -y gdb
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:ci
